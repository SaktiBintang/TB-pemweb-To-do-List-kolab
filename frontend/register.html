<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { border-radius: 30px !important; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08) !important; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="card p-4">
    <div class="card-body">
        <h2 class="text-center mb-4 fw-bold">Daftar Akun</h2>
        <div class="mb-3">
            <input type="text" id="username" class="form-control rounded-pill" placeholder="Username">
        </div>
        <div class="mb-3">
            <input type="password" id="password" class="form-control rounded-pill" placeholder="Password">
        </div>
        <button onclick="register()" class="btn btn-success w-100 rounded-pill mb-3">Daftar</button>
        <p class="text-center small">Sudah punya akun? <a href="login.html" class="text-decoration-none">Login di sini</a></p>
    </div>
</div>

<script>
    async function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        if (!username || !password) return alert("Username dan Password wajib diisi!");

        const response = await fetch('http://localhost:3000/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (response.ok) {
            alert('Berhasil daftar! Silakan login.');
            window.location.href = 'login.html';
        } else {
            alert('Gagal daftar, coba username lain');
        }
    }
</script>
</body>
</html>

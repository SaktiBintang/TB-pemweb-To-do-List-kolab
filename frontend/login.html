<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">

<div class="card p-4 auth-card">
    <div class="card-body">
        <h2 class="text-center mb-4 fw-bold">Masuk</h2>
        <div class="mb-3">
            <input type="text" id="username" class="form-control rounded-pill" placeholder="Nama Pengguna" required>
        </div>
        <div class="mb-3">
            <input type="password" id="password" class="form-control rounded-pill" placeholder="Kata Sandi" required>
        </div>
        <button id="loginBtn" onclick="login()" class="btn btn-success w-100 rounded-pill mb-3">Masuk</button>
        <p class="text-center small">Belum punya akun? <a href="register.html" class="text-decoration-none">Daftar di sini</a></p>
    </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 200px; }
    </style>
</head>
<body>
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button id="loginBtn" onclick="login()">Masuk</button>
    <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                alert('Username dan password harus diisi!');
                return;
            }

            loginBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // MENYIMPAN TOKEN, USER ID, DAN ROLE KE LOCALSTORAGE
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('role', data.role); // <-- Role disimpan di sini
                    
                    alert('Login Berhasil sebagai ' + data.role);
                    window.location.href = 'index.html'; 
                } else {
                    alert('Login Gagal, cek username atau password');
                }
            } catch (err) {
                alert('Server tidak merespon, pastikan server sudah jalan');
            } finally {
                loginBtn.disabled = false;
            }
        }
    </script>
</body>
</html>

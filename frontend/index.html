<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Tugas Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4">
        <div class="card-body">
            <div class="text-center mb-4">
                <h4 id="welcome-message" class="text-muted fw-light"></h4>
                <h1 class="fw-bold">Tugas Hari Ini</h1>
            </div>
            
            <div class="row g-2 mb-4 bg-light p-3 rounded-4">
                <div class="col-md-3"><input type="text" id="task-input" class="form-control rounded-pill" placeholder="Nama tugas..."></div>
                <div class="col-md-3"><input type="date" id="due-date-input" class="form-control rounded-pill"></div>
                <div class="col-md-2">
                    <select id="category-select" class="form-select rounded-pill">
                        <option value="1">Pekerjaan</option>
                        <option value="2">Pribadi</option>
                        <option value="3">Kuliah</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="priority-select" class="form-select rounded-pill">
                        <option value="1">Tinggi</option>
                        <option value="2">Sedang</option>
                        <option value="3" selected>Rendah</option>
                    </select>
                </div>
                <div class="col-md-2"><button onclick="addTask()" class="btn btn-success w-100 rounded-pill">Tambah</button></div>
            </div>

            <!-- Filter dan Sorting Section -->
            <div class="row g-2 mb-4 p-3 bg-light rounded-4 align-items-center">
                <div class="col-md-4">
                    <input type="text" id="search-input" class="form-control rounded-pill" placeholder="🔍 Cari tugas..." onkeyup="filterTasks()">
                </div>
                <div class="col-md-3">
                    <select id="filter-status" class="form-select rounded-pill" onchange="loadTasks()">
                        <option value="">Semua Status</option>
                        <option value="pending">Belum Selesai</option>
                        <option value="done">Selesai</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="filter-category" class="form-select rounded-pill" onchange="loadTasks()">
                        <option value="">Semua Kategori</option>
                        <option value="1">Pekerjaan</option>
                        <option value="2">Pribadi</option>
                        <option value="3">Kuliah</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="sort-select" class="form-select rounded-pill" onchange="loadTasks()">
                        <option value="">Bawaan</option>
                        <option value="due_date">Tenggat 📅</option>
                        <option value="priority">Prioritas ⚠️</option>
                    </select>
                </div>
            </div>
            
            <ul id="task-list" class="list-group"></ul>

            <div class="mt-4 d-flex justify-content-between">
                <div id="admin-panel"></div>
                <button onclick="logout()" class="btn btn-outline-danger rounded-pill px-4">Keluar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Edit Tugas -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="editModalLabel">Edit Tugas</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-task-id">
                <div class="mb-3">
                    <label for="edit-task-title" class="form-label fw-semibold">Nama Tugas</label>
                    <input type="text" id="edit-task-title" class="form-control rounded-pill">
                </div>
                <div class="mb-3">
                    <label for="edit-task-due-date" class="form-label fw-semibold">Tenggat Waktu</label>
                    <input type="date" id="edit-task-due-date" class="form-control rounded-pill">
                </div>
                <div class="mb-3">
                    <label for="edit-task-category" class="form-label fw-semibold">Kategori</label>
                    <select id="edit-task-category" class="form-select rounded-pill">
                        <option value="1">Pekerjaan</option>
                        <option value="2">Pribadi</option>
                        <option value="3">Kuliah</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="edit-task-priority" class="form-label fw-semibold">Prioritas</label>
                    <select id="edit-task-priority" class="form-select rounded-pill">
                        <option value="1">Tinggi</option>
                        <option value="2">Sedang</option>
                        <option value="3">Rendah</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Batal</button>
                <button type="button" onclick="saveTaskUpdate()" class="btn btn-primary rounded-pill px-4">Simpan Perubahan</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>

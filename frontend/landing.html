<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (localStorage.getItem('userId')) {
            window.location.href = 'index.html';
        }
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>todo. - Think, plan, and track all in one place</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        handwriting: ['Caveat', 'cursive'],
                    },
                    colors: {
                        primary: '#1a73e8',
                        'primary-hover': '#1557b0',
                        gray: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#111827',
                        }
                    },
                    backgroundImage: {
                        'dot-pattern': 'radial-gradient(#e5e7eb 1px, transparent 1px)',
                    },
                    backgroundSize: {
                        'dot-pattern': '20px 20px',
                    },
                    boxShadow: {
                        '3d': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0,0,0,0.05)',
                        'floating': '0 30px 60px -12px rgba(50,50,93,0.25), 0 18px 36px -18px rgba(0,0,0,0.3), 0 -12px 36px -8px rgba(0,0,0,0.025)',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts for handwriting effect -->
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <style data-purpose="custom-animations">
        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-10px) rotate(1deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        @keyframes float-reverse {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(10px) rotate(-1deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-float-delayed {
            animation: float 7s ease-in-out infinite;
            animation-delay: 1s;
        }

        .animate-float-reverse {
            animation: float-reverse 8s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        body {
            background-color: #ffffff;
        }

        .bg-dots {
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .shadow-app-icon {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1), inset 0 2px 4px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body class="font-sans antialiased text-gray-900 bg-white min-h-screen overflow-x-hidden flex flex-col">
    <!-- BEGIN: MainHeader -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-2 cursor-pointer">
                <div class="w-8 h-8 flex flex-wrap gap-1 items-center justify-center">
                    <div class="w-3 h-3 bg-primary rounded-full"></div>
                    <div class="w-3 h-3 bg-gray-800 rounded-full"></div>
                    <div class="w-3 h-3 bg-gray-800 rounded-full"></div>
                    <div class="w-3 h-3 bg-gray-800 rounded-full"></div>
                </div>
                <span class="text-xl font-bold tracking-tight">ToDo</span>
            </div>
            <!-- Action Buttons -->
            <div class="flex items-center gap-4">
                <a class="hidden sm:block text-gray-600 hover:text-gray-900 font-medium transition-colors"
                    href="login.html">Sign in</a>
                <a class="px-5 py-2.5 border border-gray-200 hover:border-gray-300 rounded-full text-sm font-medium text-gray-700 bg-white shadow-sm transition-all hover:shadow"
                    href="login.html">
                    Get started
                </a>
            </div>
        </div>
    </header>
    <!-- END: MainHeader -->

    <!-- BEGIN: MainContent -->
    <main class="flex-grow pt-20 relative">
        <div
            class="m-4 sm:m-6 lg:m-8 rounded-[2rem] border border-gray-200 overflow-hidden relative min-h-[calc(100vh-6rem)] bg-dots bg-gray-50/50 flex flex-col justify-center items-center py-20">
            <!-- Hero Content -->
            <div class="relative z-10 text-center max-w-4xl mx-auto px-4 mt-12 mb-32">
                <!-- Center App Icon Floating -->
                <div class="mb-12 flex justify-center animate-float">
                    <div
                        class="w-24 h-24 bg-white rounded-3xl shadow-app-icon flex flex-wrap gap-2 p-5 items-center justify-center transform rotate-3">
                        <div class="w-6 h-6 bg-[#00c2ff] rounded-full"></div>
                        <div class="w-6 h-6 bg-gray-800 rounded-full"></div>
                        <div class="w-6 h-6 bg-gray-800 rounded-full"></div>
                        <div class="w-6 h-6 bg-gray-800 rounded-full"></div>
                    </div>
                </div>
                <h1 class="text-6xl md:text-7xl lg:text-7xl font-bold tracking-tight text-gray-900 mb-6 leading-[1.1]">
                    Think, plan, and track <br />
                    <span class="text-gray-400">all in one place</span>
                </h1>
                <p class="text-xl md:text-2xl text-gray-600 mb-10 max-w-2xl mx-auto">
                    Efficiently manage your tasks and boost productivity.
                </p>
                <a class="inline-block px-8 py-4 bg-primary hover:bg-primary-hover text-white rounded-2xl font-semibold text-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5"
                    href="login.html">
                    Lets get started
                </a>
            </div>
        </div>
    </main>
    <!-- END: MainContent -->
</body>

</html>
